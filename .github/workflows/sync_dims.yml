name: Sync Dims (Manual)

# Manual trigger only — run when new customers or devices are onboarded.
# Syncs dim_customers and dim_sensors from Postgres into Snowflake silver.
#
# Requires POSTGRES_DSN to point to a network-accessible Postgres instance.
# Currently dog-eared: local Postgres is not reachable from GitHub runners.
# Future options: Railway, Supabase, Render, or AWS RDS.
on:
  workflow_dispatch:

jobs:
  sync:
    name: Sync Dims Postgres -> Snowflake
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync dim tables
        run: python sql/sync_dims.py
        env:
          POSTGRES_DSN:        ${{ secrets.POSTGRES_DSN }}
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
