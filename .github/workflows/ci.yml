name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit
    services:
      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports: ["2181:2181"]
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports: ["9092:9092"]
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      localstack:
        image: localstack/localstack:3.4
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
        ports: ["4566:4566"]
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sensor
          POSTGRES_PASSWORD: sensor
          POSTGRES_DB: sensordb
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sensor -d sensordb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MQTT_HOST: localhost
      MQTT_PORT: "1883"
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      KAFKA_TOPIC: sensor-readings
      S3_BUCKET: sensor-readings-bronze
      S3_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      POSTGRES_DSN: postgresql://sensor:sensor@localhost:5432/sensordb

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Initialize Postgres schema
        run: |
          psql "$POSTGRES_DSN" -f sql/init.sql

      - name: Register test sensor IDs
        run: |
          psql "$POSTGRES_DSN" -c "
            INSERT INTO dim_sensors (sensor_id, sensor_type, latitude, longitude, country, region, customer_id)
            VALUES (9999, 'SDS011', 48.1, 11.5, 'DE', 'Europe', 1),
                   (8888, 'test', 0.0, 0.0, 'XX', 'Other', 6)
            ON CONFLICT (sensor_id) DO NOTHING;
          "

      # Mosquitto must start after checkout so the config file exists on disk
      - name: Start Mosquitto
        run: |
          docker run -d --name mosquitto -p 1883:1883 \
            -v ${{ github.workspace }}/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf \
            eclipse-mosquitto:2.0

      - name: Wait for Mosquitto
        run: |
          for i in $(seq 1 15); do
            nc -z localhost 1883 && echo "Mosquitto ready" && break
            echo "Waiting for Mosquitto ($i/15)..."
            sleep 2
          done

      - name: Start producer (MQTT→Kafka)
        run: python -m sensor_pipeline produce &
        env:
          MQTT_HOST: localhost
          MQTT_PORT: "1883"
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          KAFKA_TOPIC: sensor-readings
          POSTGRES_DSN: postgresql://sensor:sensor@localhost:5432/sensordb

      - name: Wait for producer to connect
        run: sleep 5

      - name: Create S3 bucket in LocalStack
        run: |
          aws --endpoint-url=http://localhost:4566 s3 mb s3://sensor-readings-bronze \
            --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --integration
