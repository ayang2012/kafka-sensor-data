name: Refresh Pipeline

# SUPERSEDED by the Airflow DAG (airflow/dags/sensor_refresh.py) as of the
# Airflow + dbt rollout. That DAG does the same job with partition-dependency
# awareness (waits for bronze's hourly _SUCCESS marker) and dbt's incremental
# models, instead of this workflow's blind hourly cron + full-rebuild scripts.
#
# Running both on the same schedule against the same Snowflake tables is a
# race condition, not redundancy — confirmed happening live on 2026-06-22
# when this workflow and the Airflow DAG both ran dbt-equivalent refreshes
# within minutes of each other. The cron trigger is removed; this stays as
# a manual-only emergency fallback if the Airflow stack is ever down.
on:
  workflow_dispatch:

jobs:
  refresh:
    name: Refresh Silver + Gold
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh silver table
        run: python sql/refresh_silver.py
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

      - name: Build gold tables
        run: python sql/build_gold.py
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          # POSTGRES_DSN not set here — unregistered alert step is skipped
          # until Postgres is hosted on an accessible endpoint
