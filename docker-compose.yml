version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  bootstrap:
    build: .
    command: python -m sensor_pipeline bootstrap
    volumes:
      - ./sensor_profiles.pkl:/app/sensor_profiles.pkl
    environment:
      PYTHONUNBUFFERED: "1"

  simulator:
    build: .
    command: python -m sensor_pipeline simulate
    depends_on:
      mosquitto:
        condition: service_started
    volumes:
      - ./sensor_profiles.pkl:/app/sensor_profiles.pkl
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MIN_INTERVAL_MS: "30"
      MAX_INTERVAL_MS: "300"
      PYTHONUNBUFFERED: "1"

  producer:
    build: .
    command: python -m sensor_pipeline produce
    depends_on:
      mosquitto:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: sensor-readings
      PYTHONUNBUFFERED: "1"

  consumer:
    build: .
    command: python -m sensor_pipeline consume
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: sensor-readings
      KAFKA_CONSUMER_GROUP: sensor-consumer-group
      S3_BUCKET: sensor-readings-bronze
      S3_PREFIX: sensor-readings
      S3_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      FLUSH_INTERVAL_SECONDS: "60"
      FLUSH_BATCH_SIZE: "500"
      PYTHONUNBUFFERED: "1"
